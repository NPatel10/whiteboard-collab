services:
  relay:
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    environment:
      RELAY_ADDR: 0.0.0.0:8080
      RELAY_MAX_PARTICIPANTS_PER_BOARD: "4"
      RELAY_JOIN_CODE_LENGTH: "8"
      RELAY_CODE_TTL_SECONDS: "86400"
      RELAY_HEARTBEAT_INTERVAL_SECONDS: "25"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      relay:
        condition: service_healthy
    environment:
      PUBLIC_DEFAULT_NICKNAME: Guest
      PUBLIC_RELAY_HTTP_URL: http://relay:8080
      PUBLIC_RELAY_WS_URL: ws://relay:8080/api/v1/ws
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    ports:
      - "5173:5173"
