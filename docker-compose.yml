services:
  relay:
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    environment:
      RELAY_ADDR: :8080
      RELAY_MAX_PARTICIPANTS_PER_BOARD: "4"
      RELAY_JOIN_CODE_LENGTH: "8"
      RELAY_CODE_TTL_SECONDS: "86400"
      RELAY_HEARTBEAT_INTERVAL_SECONDS: "25"
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - relay
    environment:
      PUBLIC_DEFAULT_NICKNAME: Guest
      PUBLIC_RELAY_HTTP_URL: http://localhost:8080
      PUBLIC_RELAY_WS_URL: ws://localhost:8080/api/v1/ws
    ports:
      - "5173:5173"

